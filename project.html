<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live To-Do List</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script> 
  <style>
    body {
      font-family: Arial, sans-serif;
      font-style:  Times New Roman;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      margin-top: 50px;
    }

    .container {
      background: white;
      padding: 20px;
      width: 400px;
      border-radius: 10px;
      
    }

    h2 {
      text-align: center;
    }

    input {
      width: 75%;
      padding: 10px;
      margin-right: 5px;
    }

    button {
      padding: 10px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      padding: 10px;
      margin-bottom: 10px;
      background: #eee;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-radius: 5px;
    }

    .completed {
      color: gray;
    }

    .actions button {
      margin-left: 5px;
    } 

    .edit-input {
      width: 60%;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Live To-Do List</h2>
  <input type="text" id="taskInput" placeholder="Enter a task">
  <button id="addTask">Add</button>

  <ul id="taskList"></ul>
</div>

<script>
$(document).ready(function() {

  // Add Task
  $("#addTask").click(function() {
    let taskText = $("#taskInput").val().trim(); /* extra space remove */

    if (taskText === "") return;

    let taskItem = `
      <li>
        <span class="task-text">${taskText}</span>
        <div class="actions">
          <button class="complete">✔</button>
          <button class="edit">✏</button>
          <button class="delete">❌</button>
        </div>
      </li>
    `;

    $("#taskList").append(taskItem);
    $("#taskInput").val("");
  });

  // Delete Task
  $(document).on("click", ".delete", function() {
    $(this).closest("li").remove();
  });

  // Mark Complete
  $(document).on("click", ".complete", function() {
    $(this).closest("li").find(".task-text").toggleClass("completed");
  });

  // Edit Task
  $(document).on("click", ".edit", function() {
    let li = $(this).closest("li");
    let textSpan = li.find(".task-text");
    let currentText = textSpan.text();

    let inputField = `<input type="text" class="edit-input" value="${currentText}">`;
    textSpan.replaceWith(inputField);

    $(this).text("💾").removeClass("edit").addClass("save");
  });

  // Save Edited Task
  $(document).on("click", ".save", function() {
    let li = $(this).closest("li");
    let input = li.find(".edit-input");
    let newText = input.val();

    let textSpan = `<span class="task-text">${newText}</span>`;
    input.replaceWith(textSpan);

    $(this).text("✏").removeClass("save").addClass("edit");
  });

});
</script>

</body>
</html>
